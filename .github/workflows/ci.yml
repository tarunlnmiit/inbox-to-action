name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,mcp]'

      - name: Run tests
        run: pytest --cov=. --cov-report=term-missing

  # Publish to PyPI on a version tag (e.g. v0.2.0), after tests pass.
  # OFF by default: this repo publishes via `twine` (project-scoped token in
  # ~/.pypirc), so a plain tag push just records a GitHub release — it does NOT
  # auto-publish and never fails CI. To enable OIDC auto-publish on tags instead:
  #   1. configure the PyPI project's Trusted Publisher (repo
  #      tarunlnmiit/inbox-to-action, workflow ci.yml) — see SETUP.md, then
  #   2. set repo variable PYPI_TRUSTED_PUBLISH=true (Settings → Secrets and
  #      variables → Actions → Variables).
  # `skip-existing` keeps re-tagging an already-published version a no-op.
  publish:
    if: startsWith(github.ref, 'refs/tags/v') && vars.PYPI_TRUSTED_PUBLISH == 'true'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
